<!DOCTYPE html>
<html>
<head>
<title>AI Detection Dashboard</title>

<style>

body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

.container {
    width: 80%;
    margin: auto;
}

.card {
    background: #1e1e1e;
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
}

img {
    width: 600px;
    margin-top: 15px;
    border-radius: 10px;
    border: 2px solid white;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 10px;
}

input {
    margin-top: 10px;
}

</style>

</head>

<body>

<div class="container">

<h1>🧠 AI Object Detection Dashboard</h1>

<div class="card">

<form method="POST" enctype="multipart/form-data">

<input type="file" name="image" required>
<br>

<button type="submit">Upload & Detect</button>

</form>

</div>

{% if result_img %}

<div class="card">

<h2>Detection Result</h2>

<img src="{{ result_img }}">

</div>

<div class="card">

<h2>AI Explanation</h2>
<p>{{ explanation }}</p>

<h3>Detected Objects</h3>

<ul>
{% for obj in objects %}
<li>{{ obj }}</li>
{% endfor %}
</ul>

</div>

{% endif %}

</div>

</body>
</html>
